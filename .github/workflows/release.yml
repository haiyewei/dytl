# Build and publish multi-platform release binaries (aligned with amagi-rs release.yml).
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional existing tag to package (e.g. v1.0.0). Leave empty to use the current ref."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: dytl

jobs:
  build:
    name: ${{ matrix.name }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gnu
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: dytl-x86_64-unknown-linux-gnu.tar.gz
          - name: linux-aarch64-gnu
            os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            artifact: dytl-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - name: linux-x86_64-musl
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact: dytl-x86_64-unknown-linux-musl.tar.gz
            cross: true
          - name: linux-aarch64-musl
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            artifact: dytl-aarch64-unknown-linux-musl.tar.gz
            cross: true
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: dytl-x86_64-apple-darwin.tar.gz
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: dytl-aarch64-apple-darwin.tar.gz
          - name: windows-x86_64-msvc
            os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact: dytl-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2.81.11
        with:
          tool: cross@0.2.5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --bin "$BIN_NAME" --target "${{ matrix.target }}"
          else
            cargo build --release --locked --bin "$BIN_NAME" --target "${{ matrix.target }}"
          fi

      - name: Smoke-check native binary
        if: ${{ matrix.cross != true }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${BIN_NAME}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="${binary}.exe"
          fi
          test -f "${binary}"
          test -x "${binary}" || test "${{ runner.os }}" = "Windows"
          # dytl has no --version yet; ensure the CLI boots and prints help.
          "${binary}" --help | tee help-output.txt
          grep -F "DYTL" help-output.txt
          grep -E "monitor|douyin|kuaishou|twitter" help-output.txt

      - name: Verify cross-built binary exists
        if: ${{ matrix.cross == true }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${BIN_NAME}"
          test -f "${binary}"
          file "${binary}" || true
          # Ensure it is a non-empty ELF for musl/gnu cross targets.
          test -s "${binary}"

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -czvf "${{ matrix.artifact }}" \
            -C "target/${{ matrix.target }}/release" \
            "${BIN_NAME}"

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe" `
            -DestinationPath "${{ matrix.artifact }}"

      - name: Upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: publish-github-release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          test -n "$(find dist -type f | head -n 1)"

      - name: Checksums
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
